<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupons</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merienda:wght@300..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header-banner">
        <h1 class="logo">Thomas Préat</h1>

        <button class="nav-toggle" aria-expanded="false" aria-controls="primary-nav" aria-label="Ouvrir le menu" type="button">
            <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        </button>
        <nav id="primary-nav" class="nav-menu">
            <a href="../../index.html">Accueil</a>
            <a href="coupons.html" aria-current="page">Coupons</a>
            <a href="../recettes/recettes.html">Recettes</a>

            <div class="nav-admin">
                <button id="admin-menu-toggle" class="admin-toggle" type="button" aria-expanded="false" aria-controls="admin-login">Admin</button>
                <div id="admin-login" class="admin-login" hidden>
                    <input type="email" id="admin-username" placeholder="Email" autocomplete="username">
                    <input type="password" id="admin-password" placeholder="Password" autocomplete="current-password">
                    <button id="loginBtn" type="button">Login</button>
                    <button id="logoutBtn" type="button">Logout</button>
                    <p id="admin-login-msg" class="admin-login-msg"></p>
                </div>
            </div>
        </nav>
    </header>

    <div id="admin-editor" hidden>
    <select id="admin-select">
            <option value="">-- Choix coupon --</option>
    </select>
    <input type="text" id="admin-title" placeholder="Label">
    <input type="text" id="admin-desc" placeholder="Description">
    <select id="admin-image">
        <option value="default">-- Choix image --</option>
        <option value="bed">Lit</option>
        <option value="relax">Relax</option>
        <option value="outside">Extérieur</option>
        <option value="cooking">Cuisine</option>
        <option value="trobbio">Trobbio</option>
    </select>
    <input type="text" id="admin-tags" placeholder="Tags (comma separated)">
        <button id="admin-create" type="button">Créer</button>
        <button id="admin-update" type="button">Mettre à jour</button>
        <button id="admin-delete" type="button">Effacer</button>
    </div>

    <div class="check-controls">
    <input
        type="search"
        id="check-search"
        placeholder="Rechercher..."
        autocomplete="off"
    >

    <button id="filter-toggle" aria-label="Filtres" type="button" aria-expanded="false" aria-controls="filter-panel">
        ☰
    </button>

    <div id="filter-panel" hidden>
        <div class="filter-section">
            <h4>Trier</h4>
            <button data-sort="default" type="button">Non faits vers faits (A-Z)</button>
            <button data-sort="az" type="button">A-Z</button>
            <button data-sort="za" type="button">Z-A</button>
        </div>

        <div class="filter-section">
            <h4>Tags</h4>
            <div id="tag-filters"></div>
        </div>
    </div>
    </div>



    <section id="checklist"></section>

    <script type="module" src="../../assets/js/main.js"></script>
    <script type="module" src="../../assets/js/checklist.js"></script>
</body>
</html>
