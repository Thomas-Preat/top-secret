<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Top Secret</title>
        <script>
            // Restore clean SPA routes redirected from 404.html on static hosting.
            (function (location) {
                if (location.search[1] === "/") {
                    const decoded = location.search
                        .slice(1)
                        .split("&")
                        .map((segment) => segment.replace(/~and~/g, "&"))
                        .join("?");
                    window.history.replaceState(null, "", decoded + location.hash);
                }
            })(window.location);
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
