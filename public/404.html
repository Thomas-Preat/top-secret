<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // SPA fallback for static hosting: preserve path/query and bounce to index.
      (function () {
        var path = window.location.pathname + window.location.search + window.location.hash;
        var encoded = path.replace(/&/g, '~and~');
        window.location.replace('/?' + encoded);
      })();
    </script>
  </head>
  <body></body>
</html>
